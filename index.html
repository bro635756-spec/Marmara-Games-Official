<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmara Game Engine | Kayıt Paneli</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>

    <div class="main-container">
        <div class="mge-box">
            <div class="neon-logo">MGE</div>
            <h1>Marmara Game Engine</h1>
            <p class="date-alert">Büyük Motor Çıkışı: <span>1 Temmuz 2026</span></p>
            
            <form id="mgeRegisterForm">
                <div class="input-wrapper">
                    <input type="email" id="userEmail" placeholder="Geliştirici E-Posta Adresi" required>
                    <button type="submit" id="submitBtn">Erken Erişime Katıl</button>
                </div>
            </form>
            <div id="responseStatus" class="status-box"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
